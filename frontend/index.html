<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader</title>
    <link rel="stylesheet" href="output.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="text-white font-sans antialiased overflow-x-hidden">
    <!-- Background decoration -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-0 left-1/4 w-96 h-96 bg-violet-500/10 rounded-full blur-3xl"></div>
        <div class="absolute bottom-0 right-1/4 w-96 h-96 bg-violet-600/10 rounded-full blur-3xl"></div>
    </div>

    <div class="relative z-10 container mx-auto px-4 py-12 max-w-4xl">
        <!-- Header -->
        <header class="text-center mb-12 fade-in">
            <div class="inline-flex items-center gap-3 mb-4">
                <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-violet-500 to-violet-700 flex items-center justify-center shadow-lg shadow-violet-500/30">
                    <i data-lucide="download" class="w-6 h-6 text-white"></i>
                </div>
                <h1 class="text-3xl md:text-4xl font-bold bg-gradient-to-r from-white to-violet-300 bg-clip-text text-transparent">
                    Video Downloader
                </h1>
            </div>
            <p class="text-slate-400 text-lg">Скачивайте видео из любых источников</p>
        </header>

        <!-- Main Bento Grid -->
        <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
            <!-- Input Section - Full Width -->
            <div class="md:col-span-12 glass-card rounded-3xl p-6 md:p-8 gradient-border">
                <label class="block text-sm font-medium text-slate-400 mb-3">
                    Ссылка на видео
                </label>
                <div class="relative">
                    <input 
                        type="text" 
                        id="urlInput"
                        placeholder="https://youtube.com/watch?v=..."
                        class="w-full bg-midnight-800/50 border border-slate-700 rounded-2xl px-5 py-4 pl-14 text-white placeholder-slate-500 outline-none input-glow transition-all duration-300"
                    >
                    <div class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-500">
                        <i data-lucide="link" class="w-5 h-5"></i>
                    </div>
                    <div id="pasteIndicator" class="hidden absolute right-5 top-1/2 -translate-y-1/2">
                        <i data-lucide="sparkles" class="w-5 h-5 text-violet-400 animate-pulse"></i>
                    </div>
                </div>
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="md:col-span-12 glass-card rounded-3xl p-12 text-center">
                <div class="w-20 h-20 mx-auto mb-6 rounded-3xl bg-gradient-to-br from-slate-800 to-slate-900 flex items-center justify-center">
                    <i data-lucide="film" class="w-10 h-10 text-slate-600"></i>
                </div>
                <p class="text-slate-500 text-lg">Вставьте ссылку, чтобы начать магию</p>
                <p class="text-slate-600 text-sm mt-2">Поддерживаются YouTube и многие другие сервисы</p>
            </div>

            <!-- Loading State -->
            <div id="loadingState" class="hidden md:col-span-12 glass-card rounded-3xl p-8">
                <div class="flex items-center gap-4 mb-6">
                    <div class="w-16 h-16 rounded-2xl skeleton"></div>
                    <div class="flex-1 space-y-3">
                        <div class="h-5 w-3/4 rounded skeleton"></div>
                        <div class="h-4 w-1/2 rounded skeleton"></div>
                    </div>
                </div>
                <div class="space-y-3">
                    <div class="h-12 rounded-xl skeleton"></div>
                    <div class="h-12 rounded-xl skeleton w-3/4"></div>
                </div>
                <div class="mt-6 flex items-center justify-center gap-2 text-violet-400">
                    <i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>
                    <span class="loading-dots">Пробуждаем сервер</span>
                </div>
            </div>

            <!-- Video Info Card -->
            <div id="videoCard" class="hidden md:col-span-8 glass-card rounded-3xl p-6 fade-in">
                <div class="flex flex-col sm:flex-row gap-5">
                    <div class="relative shrink-0">
                        <img 
                            id="videoThumbnail" 
                            src="" 
                            alt="Thumbnail" 
                            class="w-full sm:w-40 h-24 object-cover rounded-2xl"
                        >
                        <div id="durationBadge" class="absolute bottom-2 right-2 bg-black/70 backdrop-blur px-2 py-1 rounded-lg text-xs font-medium hidden">
                            00:00
                        </div>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h3 id="videoTitle" class="font-semibold text-lg leading-tight mb-2 line-clamp-2"></h3>
                        <p id="videoUploader" class="text-slate-400 text-sm"></p>
                    </div>
                </div>
            </div>

            <!-- Quality Selector -->
            <div id="qualityCard" class="hidden md:col-span-4 glass-card rounded-3xl p-6 fade-in">
                <h4 class="text-sm font-medium text-slate-400 mb-4">Качество</h4>
                <div id="qualityTags" class="flex flex-wrap gap-2">
                    <!-- Quality tags will be inserted here -->
                </div>
            </div>

            <!-- Download Button -->
            <div id="downloadCard" class="hidden md:col-span-12 glass-card rounded-3xl p-6 fade-in">
                <button 
                    id="downloadBtn"
                    class="w-full btn-hover bg-gradient-to-r from-violet-600 to-violet-500 hover:from-violet-500 hover:to-violet-400 text-white font-semibold py-4 px-8 rounded-2xl flex items-center justify-center gap-3"
                >
                    <i data-lucide="download" class="w-5 h-5"></i>
                    <span>Скачать</span>
                </button>
                <p id="downloadStatus" class="text-center text-slate-400 text-sm mt-4 hidden"></p>
            </div>
        </div>

        <!-- Footer -->
        <footer class="mt-12 text-center text-slate-500 text-sm">
            <p>Работает на <span class="text-violet-400">yt-dlp</span> • Размещено на <span class="text-violet-400">Render</span></p>
        </footer>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
